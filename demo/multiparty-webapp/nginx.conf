# nginx configuration for the OpenHTTPA multiparty-webapp demo.
#
# Responsibilities:
#   1. Serve the static frontend from /usr/share/nginx/html
#   2. Proxy /api/* and /health to the backend container
#   3. Declare the correct MIME type for WebAssembly modules (.wasm)
#   4. Add minimal security headers
#
# The frontend JavaScript uses relative URLs (no hostname), so the browser
# sends both page requests and API calls to the same origin (port 3000).
# nginx transparently forwards the API calls to the Axum backend.

server {
    # DOCKER-ROOT-01: listen on unprivileged port 8080 so the nginx process
    # can run as the non-root 'nginx' user (UID 101 in nginx:alpine).
    listen 8080;
    server_name _;

    keepalive_timeout 300s;
    keepalive_requests 10000;

    root  /usr/share/nginx/html;
    index index.html;

    # ── MIME types ─────────────────────────────────────────────────────────
    # nginx 1.27 ships application/wasm by default; declare it explicitly so
    # older pinned versions also serve .wasm with the correct Content-Type.
    types {
        text/html                            html htm;
        text/css                             css;
        text/javascript                      js mjs;
        application/wasm                     wasm;
        application/json                     json;
        font/woff2                           woff2;
        image/svg+xml                        svg svgz;
        image/png                            png;
        image/webp                           webp;
    }

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header Referrer-Policy         "same-origin"     always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss: https://cloudflareinsights.com; img-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # SharedArrayBuffer is not required here but kept in case the demo
    # is extended to use multi-threaded Wasm in the future.
    # add_header Cross-Origin-Opener-Policy   "same-origin";
    # add_header Cross-Origin-Embedder-Policy "require-corp";

    # ── API proxy → backend container ─────────────────────────────────────
    # Matches /api/*, /health so the frontend never needs to hardcode the
    # backend port.
    location ~ ^/(api|health)(/|$) {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        # Use $http_host (not $host) to forward the raw Host header including any
        # non-default port (e.g. frontend:8080 in test).  $host strips the port,
        # which would break AHL authority binding on the backend.
        #
        # SEC-02 PRODUCTION WARNING: $http_host forwards the raw client-controlled
        # Host header to the backend.  In development this is required to preserve
        # port numbers (e.g. "localhost:8080") that the backend uses as the AHL
        # authority.  In a publicly exposed deployment you MUST either:
        #   a) Replace this with a fixed hostname:
        #        proxy_set_header Host "api.example.com";
        #   b) Or validate / normalise the Host header with an `if` block before
        #      forwarding, to prevent a client from injecting an arbitrary authority
        #      value into the AHL MAC computation.
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Optimize for WebSockets
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Surface backend errors as JSON rather than nginx's HTML error pages.
        proxy_intercept_errors off;
    }

    # ── Static file serving ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;

        # Disable aggressive caching for demo to avoid stale binaries.
        location ~* \.(wasm|js|mjs)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header X-Content-Type-Options "nosniff" always;
        }
    }
}
