[package]
name        = "multiparty-webapp-backend"
description = "OpenHTTPA multi-party computation demo — Axum backend"
version.workspace    = true
edition.workspace    = true
rust-version.workspace = true
license.workspace    = true

[[bin]]
name = "backend"
path = "src/main.rs"

[features]
zk = ["openhttpa-core/zk", "openhttpa-server/zk", "dep:openhttpa-zk"]

[dependencies]
openhttpa-zk           = { path = "../../../crates/openhttpa-zk", version = "0.1.0", optional = true }
openhttpa-proto        = { path = "../../../crates/openhttpa-proto", version = "0.1.0" }
openhttpa-crypto       = { path = "../../../crates/openhttpa-crypto", version = "0.1.0" }
openhttpa-headers      = { path = "../../../crates/openhttpa-headers", version = "0.1.0" }
openhttpa-core         = { path = "../../../crates/openhttpa-core", version = "0.1.0" }
openhttpa-attestation  = { path = "../../../crates/openhttpa-attestation", version = "0.1.0" }
openhttpa-tee          = { path = "../../../crates/openhttpa-tee", version = "0.1.0" }
openhttpa-server       = { path = "../../../crates/openhttpa-server", version = "0.1.0" }
openhttpa-client       = { path = "../../../crates/openhttpa-client", version = "0.1.0" }
getrandom           = { workspace = true }
openhttpa-llm          = { path = "../../../crates/openhttpa-llm", version = "0.1.0" }
openhttpa-mcp          = { path = "../../../crates/openhttpa-mcp", version = "0.1.0" }
openhttpa-a2a           = { path = "../../../crates/openhttpa-a2a", version = "0.1.0" }
openhttpa-mesh         = { path = "../../../crates/openhttpa-mesh", version = "0.1.0" }
openhttpa-transport    = { path = "../../../crates/openhttpa-transport", version = "0.1.0" }
openhttpa-oracle       = { path = "../../../crates/openhttpa-oracle", version = "0.1.0" }
uuid                = { workspace = true }
async-trait         = "0.1"
axum                = { workspace = true, features = ["macros"] }
tower               = { workspace = true }
tower-http          = { version = "0.6", features = ["cors", "trace"] }
tokio               = { workspace = true, features = ["rt-multi-thread", "macros", "signal"] }
tracing             = { workspace = true }
tracing-subscriber  = { version = "0.3", features = ["env-filter"] }
serde               = { workspace = true }
serde_json          = { workspace = true }
bytes               = { workspace = true }
http                = { workspace = true }
rand                = { workspace = true }
base64ct            = { version = "1", features = ["alloc"] }
hex                 = "0.4"
sha2                = "0.10"
hmac                = { workspace = true }
futures             = { workspace = true }
