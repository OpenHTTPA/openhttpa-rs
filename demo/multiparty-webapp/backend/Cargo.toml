[package]
name        = "multiparty-webapp-backend"
description = "OpenHTTPA multi-party computation demo — Axum backend"
version.workspace    = true
edition.workspace    = true
rust-version.workspace = true
license.workspace    = true

[[bin]]
name = "backend"
path = "src/main.rs"

[features]
zk = ["openhttpa-core/zk", "openhttpa-server/zk", "dep:openhttpa-zk"]

[dependencies]
openhttpa-zk           = { workspace = true, optional = true }
openhttpa-proto        = { workspace = true }
openhttpa-crypto       = { workspace = true }
openhttpa-headers      = { workspace = true }
openhttpa-core         = { workspace = true }
openhttpa-attestation  = { workspace = true }
openhttpa-tee          = { workspace = true }
openhttpa-server       = { workspace = true }
openhttpa-client       = { workspace = true }
getrandom           = { workspace = true }
openhttpa-llm          = { workspace = true }
openhttpa-mcp          = { workspace = true }
openhttpa-a2a          = { workspace = true }
openhttpa-mesh         = { workspace = true }
openhttpa-transport    = { workspace = true }
openhttpa-oracle       = { workspace = true }
uuid                = { workspace = true }
axum                = { workspace = true, features = ["macros"] }
tower               = { workspace = true }
tower-http          = { version = "0.6", features = ["cors", "trace"] }
tokio               = { workspace = true, features = ["rt-multi-thread", "macros", "signal"] }
tracing             = { workspace = true }
tracing-subscriber  = { version = "0.3.20", features = ["env-filter"] }
serde               = { workspace = true }
serde_json          = { workspace = true }
bytes               = { workspace = true }
http                = { workspace = true }
rand                = { workspace = true }
base64ct            = { version = "1", features = ["alloc"] }
hex                 = "0.4"
sha2                = "0.10"
hmac                = { workspace = true }
futures             = { workspace = true }
async-trait = "0.1.89"
