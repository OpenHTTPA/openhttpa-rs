services:
  nginx-proxy:
    build:
      context: ../../
      dockerfile: modules/nginx/Dockerfile
    ports:
      - '8081:8081'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - backend

  caddy-proxy:
    build:
      context: ../../
      dockerfile: modules/caddy/Dockerfile
    ports:
      - '8082:8082'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./index.html:/usr/share/caddy/index.html:ro
    depends_on:
      - backend

  backend:
    image: hashicorp/http-echo
    command: -text="Hello from OpenHTTPA Attested Backend!"
    ports:
      - '8085:5678'
