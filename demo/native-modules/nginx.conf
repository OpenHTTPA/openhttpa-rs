load_module modules/ngx_http_openhttpa_module.so;

worker_processes 1;
events { worker_connections 1024; }

http {
    include mime.types;
    default_type application/octet-stream;

    server {
        listen 8081;
        server_name 127.0.0.1 openhttpa-native.openhttpa.org;

        # The native OpenHTTPA module handles /api/attest via content handler
        # and other requests via body filter.

        location = / {
            root html;
            index index.html;
        }

        location / {
            # Opportunistic upgrade probing
            if ($request_method = OPTIONS) {
                add_header Attest-Versions "openhttpa";
                return 204;
            }

            proxy_pass http://backend:8080;
            
            # Attestation-related headers for the backend (if needed)
            proxy_set_header X-Attested "true";
        }
    }
}
