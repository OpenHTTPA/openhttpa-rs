<!doctype html>
<html>
  <head>
    <title>OpenHTTPA Test Page</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 40px;
        background: #f1f5f9;
      }
      .card {
        background: white;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        max-width: 600px;
      }
      button {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
      }
      #status {
        margin-top: 20px;
        font-weight: bold;
      }
      #response {
        margin-top: 10px;
        font-family: monospace;
        white-space: pre-wrap;
        background: #eee;
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>OpenHTTPA Test Page</h1>
      <p>This page tests transparent attestation through Nginx/Caddy.</p>
      <button id="send-request">Send Upgraded POST</button>
      <div id="status">Status: Waiting...</div>
      <div id="response"></div>
    </div>

    <script>
      document.getElementById('send-request').onclick = async () => {
        document.getElementById('status').innerText = 'Status: Sending...';
        try {
          // The extension should intercept this and upgrade it to TrR
          const resp = await fetch('/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: 'Hello from Browser!' }),
          });
          const text = await resp.text();
          document.getElementById('status').innerText = 'Status: Success!';
          document.getElementById('response').innerText = text;
        } catch (e) {
          document.getElementById('status').innerText = 'Status: Error: ' + e;
        }
      };
    </script>
  </body>
</html>
