name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: '-D warnings'
  OPENHTTPA_SKIP_ZK_BUILD: '1'
  RISC0_SKIP_BUILD_KERNELS: '1'

jobs:
  verify:
    name: Formal Verification & CI
    runs-on: self-hosted
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Proactive Disk Hygiene
        run: |
          docker system prune -f --volumes || true
          rm -rf /tmp/openhttpa-build-* || true

      - name: Run Full Verification Suite
        run: make verify-all

      - name: Run Formal Security Proofs
        run: make formal-verify
