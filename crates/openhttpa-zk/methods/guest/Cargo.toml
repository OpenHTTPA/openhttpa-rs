[package]
name = "openhttpa-zk-guest"
version.workspace = true
edition.workspace = true
license.workspace = true

[package.metadata.risc0]
methods = ["guest"]

[features]
default = []
mock = []

[[bin]]
name = "openhttpa-zk-guest"
path = "src/main.rs"
test = false

[dependencies]
risc0-zkvm = { version = "3.0.5", default-features = false, features = ["std"] }
serde = { version = "1", default-features = false, features = ["derive"] }
# Precompiled/accelerated crypto for the guest
sha2 = { version = "0.11", default-features = false }
k256 = { version = "0.13", default-features = false, features = ["ecdsa"] }
p256 = { version = "0.13", default-features = false, features = ["ecdsa"] }
x509-cert = { version = "0.2", default-features = false }
der = { version = "0.8", default-features = false, features = ["alloc"] }
serde-big-array = { version = "0.5", default-features = false }
serde_json = { version = "1", default-features = false, features = ["alloc"] }
postcard = { workspace = true }

# NOTE: [profile.*] sections are ignored in workspace member Cargo.toml files.
# All profile configuration for this guest crate lives in the workspace root
# Cargo.toml under [profile.release-zk-guest] and must be selected with
# `cargo build --profile release-zk-guest` by the RISC Zero build toolchain.
# See: https://doc.rust-lang.org/cargo/reference/profiles.html
