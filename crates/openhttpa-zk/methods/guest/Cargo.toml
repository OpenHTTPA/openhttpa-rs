[package]
name = "openhttpa-zk-guest"
version.workspace = true
edition.workspace = true
license.workspace = true

[package.metadata.risc0]
methods = ["guest"]

[features]
default = []
mock = []

[[bin]]
name = "openhttpa-zk-guest"
path = "src/main.rs"
test = false

[dependencies]
risc0-zkvm = { version = "1.2", default-features = false, features = ["std"] }
serde = { version = "1", default-features = false, features = ["derive"] }
# Precompiled/accelerated crypto for the guest
sha2 = { version = "0.10", default-features = false }
k256 = { version = "0.13", default-features = false, features = ["ecdsa"] }
p256 = { version = "0.13", default-features = false, features = ["ecdsa"] }
x509-cert = { version = "0.2", default-features = false }
der = { version = "0.7", default-features = false, features = ["alloc"] }
serde-big-array = { version = "0.5", default-features = false }
serde_json = { version = "1", default-features = false, features = ["alloc"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
debug = false
