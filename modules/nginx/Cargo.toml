[package]
name = "openhttpa-nginx"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Native OpenHTTPA module for Nginx (Pure Rust)"

[lib]
crate-type = ["cdylib"]

[dependencies]
ngx = { version = "0.5", features = ["vendored"] }
openhttpa-core   = { workspace = true }
openhttpa-crypto = { workspace = true }
openhttpa-proto  = { workspace = true }
openhttpa-server = { workspace = true }
openhttpa-tee    = { workspace = true }
lazy_static   = "1.4"
serde         = { workspace = true, features = ["derive"] }
serde_json    = { workspace = true }
tokio         = { workspace = true }
hex           = { workspace = true }
dashmap       = { workspace = true }
log           = "0.4"
rand          = { workspace = true }
threadpool    = "1.8"

[build-dependencies]
bindgen = "0.71"

