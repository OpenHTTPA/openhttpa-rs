# OpenHTTPA Audit Configuration
# Transitive dependencies from RISC Zero / arkworks stack are ignored if they are unmaintained 
# but not exploitable in our specific usage or if no alternative exists.

[advisories]
ignore = [
    "RUSTSEC-2024-0388", # derivative: unmaintained, from ark-relations (risc0)
    "RUSTSEC-2024-0436", # paste: unmaintained, from ark-ff (risc0)
    "RUSTSEC-2025-0055", # tracing-subscriber: vulnerability (poisoning), from ark-relations (risc0)
    "RUSTSEC-2025-0141", # bincode: unmaintained, from risc0-zkvm
    "RUSTSEC-2023-0071", # rsa: timing vulnerability, from rzup/risc0-build
]
